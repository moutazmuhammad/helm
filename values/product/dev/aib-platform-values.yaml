## ----------------------------------------
## Mesh Security
## ----------------------------------------

# To check mTLS is configured via PeerAuthentication:
# kubectl get peerauthentication -A 
# kubectl get peerauthentication -n argocd
mesh-security:
  meshSecurity:
    mtls:
      enabled: true
      mode: STRICT
      namespaces: 
        - name: aib-auth
        - name: aib-system
        - name: aib-data
        - name: aib-serving

    authorizationPolicies:
      - name: aib-auth
        namespace: aib-auth
        action: ALLOW
        rules:
          - from:
              - namespaces:
                  - aib-auth
                  - istio-system

    requestAuthentication: []
    rateLimiting: []


## ----------------------------------------
## Mesh Networking
## ----------------------------------------

# To check Istio Gateway and Virtual Services :
# kubectl get gateways.networking.istio.io -A
# kubectl get virtualservices.networking.istio.io -A
# kubectl get destinationrule.networking.istio.io -A

mesh-networking:
  meshNetworking:
    domain: "dev.plus.aib.vodafone.com"
    namespace: aib-auth
    gateway:
      enabled: true
      name: platform-ingress-gateway
      selector:
        istio: ingressgateway
      port:
        number: 80
        name: http
        protocol: HTTP

    services:
      - name: nuclio-dashboard
        subdomain: nuclio
        serviceNamespace: aib-system
        port: 8070
        timeout: 300s
        retries:
          attempts: 3
          perTryTimeout: 120s
        trafficPolicy:
          tls:
            mode: ISTIO_MUTUAL

      - name: mlrun-ui
        subdomain: mlrun
        serviceNamespace: aib-system
        port: 80

        routes:
          - pathPrefix: /mlrun/api
            host: mlrun-api.aib-system.svc.cluster.local
            port: 8080
            rewrite: /api

          - pathPrefix: /mlrun
            host: mlrun-ui.aib-system.svc.cluster.local
            port: 80
            rewrite: /

          - pathPrefix: /api
            host: mlrun-api.aib-system.svc.cluster.local
            port: 8080

          - pathPrefix: /
            host: mlrun-ui.aib-system.svc.cluster.local
            port: 80

        trafficPolicy:
          tls:
            mode: ISTIO_MUTUAL

      # ---------------------------------------------------------------------
      # SeaweedFS — S3 API, master web UI, filer web UI
      #
      # The same Gateway listens on plain HTTP at *.dev.plus.aib.vodafone.com,
      # so all three subdomains resolve through it. mTLS toward the upstream
      # pods is enforced by mesh-security PeerAuthentication STRICT on
      # aib-data; setting trafficPolicy.tls.mode: ISTIO_MUTUAL on the
      # DestinationRule avoids client/server mode mismatch.
      # ---------------------------------------------------------------------
      - name: seaweedfs-s3
        subdomain: s3
        serviceNamespace: aib-data
        port: 8333
        timeout: 600s
        retries:
          attempts: 3
          perTryTimeout: 120s
        trafficPolicy:
          tls:
            mode: ISTIO_MUTUAL

      - name: seaweedfs-filer
        subdomain: seaweedfs-filer
        serviceNamespace: aib-data
        port: 8888
        trafficPolicy:
          tls:
            mode: ISTIO_MUTUAL
            
      # SeaweedFS Admin dashboard — port 23646. The single operator UI:
      # cluster status, volume topology, bucket management, and S3 IAM
      # (access-key generation). Login is gated by the
      # seaweedfs-admin-credentials Secret in aib-data.
      #
      # The legacy master web UI (port 9333) and filer UI (port 8888) are NOT
      # exposed — the admin dashboard supersedes the master UI, and the filer
      # UI was a directory browser used mainly for ad-hoc file debugging
      # (use `aws s3` against the s3 endpoint, or `kubectl port-forward
      # svc/seaweedfs-filer 8888:8888` if you ever need it).
      - name: seaweedfs-admin
        subdomain: seaweedfs-admin
        serviceNamespace: aib-data
        port: 23646
        trafficPolicy:
          tls:
            mode: ISTIO_MUTUAL


## ----------------------------------------
## Mesh Egress
## ----------------------------------------

mesh-egress:
  meshEgress:
    namespace: aib-auth
    gateway:
      enabled: false
      name: platform-egress-gateway
      serviceNamespace: istio-system
      selector:
        istio: egressgateway

    services:
      - name: gar-europe-west1
        enabled: true
        namespace: aib-system
        host: europe-west1-docker.pkg.dev
        port: 443
        resolution: DNS
        location: MESH_EXTERNAL

      - name: gcs
        enabled: true
        namespace: aib-system
        host: storage.googleapis.com
        port: 443
        resolution: DNS
        location: MESH_EXTERNAL
      
      # - name: gcp-oauth
      #   enabled: true
      #   namespace: aib-system
      #   host: oauth2.googleapis.com
      #   port: 443
      #   resolution: DNS
      #   location: MESH_EXTERNAL
      
      # - name: gke-metadata
      #   enabled: true
      #   namespace: aib-system
      #   host: metadata.google.internal
      #   port: 80
      #   resolution: DNS
      #   location: MESH_EXTERNAL
      
      - name: nuget-api
        enabled: true
        namespace: aib-system
        host: api.nuget.org
        port: 443
        resolution: DNS
        location: MESH_EXTERNAL