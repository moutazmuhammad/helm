global:
  registry:
    url: "europe-west1-docker.pkg.dev/vf-grp-aibplus-dev-mlproduct/nuclio-functions-registry"
    secretName: "nuclio-gar-push"
  
  infrastructure:
    kind: standalone                   # cloud-agnostic, no provider assumptions
    provider: ~                        # Set to null since we target any provider.
    inboundCidrs: ~                    # Set to null since we target any provider
    loadBalancerName: ~                # Not used with ClusterIP services
    aws:                   
      bucketName: mlrun                # Even with non-AWS setups, this value is used because MinIO is S3-compatible.
      s3NonAnonymous: false            # Use this only with real AWS S3 and IAM-based authentication.
      domainNameCertificate: ~         # Only used when infrastructure.kind is "aws". Not relevant here.


# =============================================================================
# Nuclio - Serverless Functions
# =============================================================================

nuclio:
  externalHostAddress: nuclio.dev.plus.aib.vodafone.com
  fullnameOverride: nuclio
  registry:
    dependantImageRegistryURL: "europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images"     
  controller:
    namespace: ""
    enabled: true
    # Leader-elected — only one replica is active at a time. Keep at 1
    # because a second pod would idle as a hot standby that adds no
    # throughput, and the controller restart surface is small enough that
    # scheduling preserves availability.
    replicas: 1

    image:
      repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/nuclio-controller
      tag: 1.15.9-amd64
      pullPolicy: IfNotPresent

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  dashboard:
    enabled: true
    # 2 replicas for HA in dev. PDB ships via scripts/pdbs.yaml.
    replicas: 2
    service:
      type: ClusterIP
    containerBuilderKind: kaniko

    image:
      repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/nuclio-dashboard
      tag: 1.15.9-amd64
      pullPolicy: IfNotPresent
    
    kaniko:
      image:
        repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/kaniko-executor
        tag: v1.23.2

      initContainerImage:
        busybox:
          repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/busybox
          tag: stable

        awscli:
          repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/aws-cli
          tag: 2.17.16

    ingress:
      enabled: false

    # Run dashboard as non-root
    securityContext:                   
      runAsNonRoot: true
      runAsUser: 1000

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi

    # Spread the two dashboard replicas across nodes — single-node failure
    # then drops at most one replica.
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                nuclio.io/app: dashboard
            topologyKey: kubernetes.io/hostname

    rbac:
      create: true
      crdAccessMode: cluster
    
    # Install Nuclio CRDs (NuclioFunction, NuclioProject, NuclioFunctionEvent)
    crd:                               
      create: true

    # # Target namespace where Nuclio deploys serverless function pods.
    # functionNamespace: aib-serving 

    platform:
      projectsLeader:                  # Who is the source of truth for project definitions.
        kind: mlrun                    # "mlrun" (MLRun manages projects, Nuclio follows),
        synchronizationInterval: 10m   # How often Nuclio syncs project state from MLRun.
        apiAddress: http://mlrun-api-chief:8080/api

    autoscaler:
      image:
        repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/nuclio-autoscaler
        tag: 1.15.9-amd64
    dlx:
      image:
        repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/nuclio-dlx
        tag: 1.15.9-amd64
# =============================================================================
# MLRun Core
# =============================================================================
mlrun:
  externalHostAddress: mlrun.dev.plus.aib.vodafone.com
  fullnameOverride: mlrun
  enabled: true

  # Default resource limits/requests applied to MLRun-submitted function pods (training jobs, serving functions, etc.)
  defaultFunctionPodResources:
    limits:
      cpu: "2"
      memory: "20Gi"
    requests:
      cpu: "25m"
      memory: "1Mi"

  # Options: "filesystem" (uses S3/SeaweedFS via S3 protocol), "s3" (direct AWS S3)
  # Stay on filesystem — only this mode honours S3_ENDPOINT_URL, which is
  # required to reach SeaweedFS instead of native AWS S3.
  storage: filesystem
  storageAutoMountParams: ~

  # S3 credentials reach the API and function pods through the
  # `minio-credentials` Kubernetes Secret (see api.envFrom below). The
  # legacy `secrets.s3.accessKey/secretKey` knobs only apply when
  # `storage: s3`, so they are intentionally omitted here.
  #
  # `minio-credentials` is declared directly in scripts/secrets.yaml and
  # must carry the same accessKey/secretKey as the `anvAdmin` identity in
  # `seaweedfs-s3-config` (aib-data). No runtime derivation.

  # MLRun's Nuclio integration mode.
  nuclio:
    mode: enabled
    uiURL: https://nuclio.dev.plus.aib.vodafone.com
    apiURL: http://nuclio-dashboard.aib-system.svc.cluster.local:8070

  rbac:
    create: true

  api:
    extraEnv:
      - name: MLRUN_FUNCTION_CATALOG_URL
        value: "https://your-custom-marketplace.com"
      - name: MLRUN_FUNCTION_CATALOG_PATH
        value: "/your-org/functions/main"

    ingress:
      enabled: false
    fullnameOverride: mlrun-api
    service:
      type: ClusterIP

    # Leader (writes state). Keep at 1; MLRun's HTTPDB is single-writer.
    chief:
      minReplicas: 1

    # Workers serve read APIs and run async jobs — safe to scale horizontally.
    # Keeps two warm pods so a single pod restart does not break /api reads.
    worker:
      minReplicas: 2
      maxReplicas: 4

    image:
      repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/mlrun-api
      tag: 1.10.0
      pullPolicy: IfNotPresent

    # Sidecar that streams function pod logs to the API.
    sidecars:
      logCollector:
        enabled: true
        image:
          repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/mlrun-log-collector
          tag: 1.10.0
          pullPolicy: IfNotPresent

    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 750m
        memory: 768Mi

    # Per-pod scratch dir at httpDB.dirPath (/mlrun/db). Held only:
    #   - the legacy SQLite DB (unused — DSN is MySQL)
    #   - the logCollector sidecar's per-pod workDir cache
    # Both are pod-local by nature, so a shared RWO PVC would deadlock the
    # second of (chief + 2 workers + model-server) on a different node.
    # emptyDir gives each replica its own writable mount with no contention.
    #
    # The umbrella mlrun-ce/values.yaml defaults to a persistentVolumeClaim
    # override; null it explicitly so Helm's deep merge doesn't render both
    # volume sources on the same volume.
    volumes:
      storageOverride:
        emptyDir: {}
        persistentVolumeClaim: null

    # No shared PVC — each pod has its own emptyDir above. Persistent state
    # lives in MySQL (metadata) and SeaweedFS S3 (artifacts), so losing the
    # local scratch on pod restart is harmless.
    persistence:
      enabled: false
    
    envFrom:
      - configMapRef:
          name: mlrun-common-env
      - configMapRef:
          name: mlrun-pipelines-config
          optional: true
      - configMapRef:
          name: mlrun-spark-config
          optional: true
      - configMapRef:
          name: mlrun-override-env
          optional: true
      - secretRef:
          name: minio-credentials

    extraEnvKeyValue:
      S3_ENDPOINT_URL: "http://seaweedfs-s3.aib-data.svc.cluster.local:8333"
      AWS_ENDPOINT_URL_S3: "http://seaweedfs-s3.aib-data.svc.cluster.local:8333"
      AWS_S3_ENDPOINT_URL: "http://seaweedfs-s3.aib-data.svc.cluster.local:8333"
      # SeaweedFS S3 only supports path-style addressing; force boto/aioboto
      # away from virtual-hosted-style requests.
      S3_ADDRESSING_STYLE: "path"
      S3_VERIFY_SSL: "false"
      # -----------------------------------------------------------------------
      # MLRun Function Hub (marketplace)
      # -----------------------------------------------------------------------
      # Default upstream is https://mlrun.github.io/marketplace — unreachable
      # from this cluster (no egress to github.io). Pick ONE of the two blocks
      # below and uncomment it.
      #
      # --- Option A: Disable the default hub entirely -------------------------
      # Prevents MLRun from auto-registering the github.io source on startup.
      # Use this if your users don't need the public function catalog.
      #
      # MLRUN_HUB__DEFAULT_SOURCE__CREATE: "false"
      # MLRUN_HUB__DEFAULT_SOURCE__URL: ""
      #
      # --- Option B: Mirror the hub on an internal GitHub ---------------------
      # Mirror mlrun/functions (the catalog repo) to an internal GitHub and
      # point MLRun at the Pages/raw URL. The URL must serve the same layout
      # as mlrun.github.io/marketplace (i.e. /functions/<channel>/catalog.json).
      # Adjust org/repo/channel to match your mirror.
      #
      # MLRUN_HUB__DEFAULT_SOURCE__URL: "https://github.vodafone.com/pages/<org>/mlrun-marketplace"
      # MLRUN_HUB__DEFAULT_SOURCE__CHANNEL: "master"

    extraPersistentVolumeMounts: ~

  ui:
    fullnameOverride: mlrun-ui
    # 2 replicas for HA in dev. PDB ships via scripts/pdbs.yaml.
    replicaCount: 2

    image:
      repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/mlrun-ui
      tag: 1.10.0
      pullPolicy: IfNotPresent

    ingress:
      # Ingress for MLRun UI. Same reasoning as api.ingress.
      enabled: false
    service:
      # Service type for MLRun UI.
      # Options: same as api.service.type above.
      type: ClusterIP
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      runAsNonRoot: true
    podSecurityContext:
      runAsNonRoot: true
    # Resource limits for the MLRun UI pod.
    resources:
      requests:
        cpu: 25m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 96Mi

  db:
    enabled: false
    name: db
    existingDsnSecret: true
    fullnameOverride: mlrun-db
    persistence:
      enabled: false

  httpDB:
    dbType: mysql
    dirPath: "/mlrun/db"

    # Points to the external mlrun-db-primary service (bitnami/mysql with
    # architecture: replication exposes the writable endpoint as
    # <fullname>-primary, not <fullname>). Password must match the
    # mysql-credentials Secret; the real DSN ships from the mlrun-db Secret
    # (db.existingDsnSecret: true) so this value is just a fallback example.
    #   --set-string mlrun.httpDB.dsn="mysql+pymysql://root:<password>@mlrun-db-primary.aib-data.svc.cluster.local:3306/mlrun"
    dsn: mysql+pymysql://root@mlrun-db-primary.aib-data.svc.cluster.local:3306/mlrun
    oldDsn: sqlite:////mlrun/db/mlrun.db?check_same_thread=false

  modelMonitoring:
    dsn:

  ce:
    mode: full

  
# =============================================================================
# Jupyter Notebook
# =============================================================================
jupyterNotebook:
  enabled: false
  serviceAccount:
    create: false
  persistence:
    enabled: false


# =============================================================================
# S3-Compatible Object Store — SeaweedFS (MinIO replaced)
#
# This chart does NOT create a MinIO instance. All components route to the
# SeaweedFS S3 gateway installed in aib-data via a separate helm release
# (see values/product/dev/seaweedfs.yaml).
#
# The "minio" key here is the integration surface mlrun-ce exposes; only the
# value of `externalHost` and `service.port` are read by the helper templates
# (_helpers.tpl: mlrun-ce.minio.service.host / .url). Renaming the key would
# require patching the upstream chart.
#
# SECRETS: Object store credentials are NOT stored in values.yaml. They are
# minted by the SeaweedFS chart and copied into aib-system before MLRun
# starts — see the mlrun.secrets block above for the exact commands.
# =============================================================================
minio:
  enabled: false

  # Cross-namespace DNS endpoint for the SeaweedFS S3 gateway in aib-data.
  # Used by _helpers.tpl to resolve the S3 endpoint for MLRun, Jupyter,
  # Pipelines, and Argo.
  externalHost: seaweedfs-s3.aib-data.svc.cluster.local

  # Credentials live in this Secret; do NOT add inline rootUser/rootPassword
  # — they would override the Secret and put plaintext keys into values.yaml.
  existingSecret: "minio-credentials"

  service:
    port: 8333


# =============================================================================

pipelines:
  enabled: false
  crd:
    enable: false
  priority_class:
    enable: false

spark-operator:
  enabled: false
  image:
    repository: vf-grp-aib-dev-mirror/aib-plus-images/spark-operator
    tag: "2.1.0"

mpi-operator:
  deployment:
    create: false

  image:
    deployment:
      repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/mpi-operator
      tag: v0.2.3-igz
    kubectlDelivery:
      repository: europe-west1-docker.pkg.dev/vf-grp-aib-dev-mirror/aib-plus-images/mpi-kubectl-delivery
      tag: v0.2.3

# =============================================================================
# Kube Prometheus Stack - DISABLED
# =============================================================================
kube-prometheus-stack:
  enabled: false
  grafana:
    enabled: false
    service:
      nodePort: 0

# =============================================================================
# TDengine
#
# Time-series database used by MLRun for model monitoring metrics storage.
# Disabled here. Enable if you need MLRun's built-in model monitoring with
# time-series data (prediction drift, data quality metrics).
# Alternative: use an external time-series DB and configure MLRun to connect to it.
# =============================================================================
tdengine:
  enabled: false

# =============================================================================
# Kafka - DISABLED (will be installed separately in aib-data namespace)
#
# Event streaming platform used by MLRun for:
# - Real-time model monitoring (streaming prediction data)
# - Event-driven function triggers
#
# Disabled here because Kafka is deployed in aib-data namespace with its own
# MLRun connects to Kafka via configuration at runtime (not via chart values).
# =============================================================================
kafka:
  enabled: false