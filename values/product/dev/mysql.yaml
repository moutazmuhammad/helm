# Keep the service name as "mlrun-db" so existing DSN and grafana datasource
# references (mlrun-db:3306) continue to work unchanged.
fullnameOverride: mlrun-db

architecture: replication

global:
  security:
    allowInsecureImages: true

# -----------------------------------------------------------------------------
# Images
# -----------------------------------------------------------------------------
# Bitnami moved versioned, non-hardened images from `bitnami/*` to
# `bitnamilegacy/*`. Every image pulled by this chart is pinned below so the
# deployment doesn't break when upstream tags disappear from docker.io/bitnami.
#
# Source of defaults: charts/mysql/values.yaml (Chart.yaml annotations).
# -----------------------------------------------------------------------------

image:
  registry: europe-west1-docker.pkg.dev
  repository: vf-grp-aib-dev-mirror/aib-plus-images/bitnami-mysql
  tag: 9.4.0-debian-12-r1
  pullPolicy: IfNotPresent

volumePermissions:
  image:
    registry: europe-west1-docker.pkg.dev
    repository: vf-grp-aib-dev-mirror/aib-plus-images/bitnami-os-shell
    tag: 12-debian-12-r50
    pullPolicy: IfNotPresent

metrics:
  enabled: false
  image:
    registry: europe-west1-docker.pkg.dev
    repository: vf-grp-aib-dev-mirror/aib-plus-images/bitnami-mysqld-exporter
    tag: 0.17.2-debian-12-r16
    pullPolicy: IfNotPresent
  serviceMonitor:
    enabled: true
    namespace: aib-data

auth:
  existingSecret: mysql-credentials
  createDatabase: false

tls:
  enabled: false

initdbScripts:
  01-create-mlrun-databases.sh: |
    #!/bin/bash
    # Bitnami sources (not executes) this file because the configmap mount
    # isn't executable, so it inherits the parent shell's `set -u`. Keep it
    # defensive: no parameter-expansion defaults, no undefined variable
    # references.
    #
    # The chart mounts this same configmap on both primary and secondary.
    # On the secondary, root doesn't exist locally yet (it arrives via
    # replication), so skip this script anywhere that isn't the master.
    set +u
    if [ "${MYSQL_REPLICATION_MODE:-}" != "master" ]; then
        echo "Skipping mlrun database bootstrap on non-master (MYSQL_REPLICATION_MODE=${MYSQL_REPLICATION_MODE:-unset})"
        return 0 2>/dev/null || exit 0
    fi
    MLRUN_DB_PW=""
    if [ -f /opt/bitnami/mysql/secrets/mysql-root-password ]; then
        MLRUN_DB_PW=$(cat /opt/bitnami/mysql/secrets/mysql-root-password)
    fi
    /opt/bitnami/mysql/bin/mysql -uroot -p"$MLRUN_DB_PW" -e "CREATE DATABASE IF NOT EXISTS mlrun; CREATE DATABASE IF NOT EXISTS mlrun_model_monitoring;"

  02-create-seaweedfs-user.sh: |
    #!/bin/bash
    # Provision the SeaweedFS filer's database + user on this MySQL instance.
    # Runs once on first bootstrap of the primary. The password comes from the
    # `seaweedfs-db-credentials` Secret (key: mariadb-password), mounted at
    # /seaweedfs-init by `primary.extraVolumes` below. The same Secret is
    # referenced by the SeaweedFS chart's externalDatabase.existingSecret, so
    # the two sides share the single source of truth for the password.
    set +u
    if [ "${MYSQL_REPLICATION_MODE:-}" != "master" ]; then
        echo "Skipping seaweedfs bootstrap on non-master"
        return 0 2>/dev/null || exit 0
    fi
    if [ ! -f /seaweedfs-init/mariadb-password ]; then
        echo "seaweedfs-db-credentials secret not mounted — skipping seaweedfs user creation"
        return 0 2>/dev/null || exit 0
    fi
    ROOT_PW=""
    if [ -f /opt/bitnami/mysql/secrets/mysql-root-password ]; then
        ROOT_PW=$(cat /opt/bitnami/mysql/secrets/mysql-root-password)
    fi
    SW_PW=$(cat /seaweedfs-init/mariadb-password)
    # Includes the `filemeta` table that the SeaweedFS filer expects to find.
    # The filer (chart 4.21) does NOT auto-create this schema — it errors out
    # with "Table 'seaweedfs.filemeta' doesn't exist" if missing. Schema
    # matches the upstream MySQL store definition.
    /opt/bitnami/mysql/bin/mysql -uroot -p"$ROOT_PW" <<EOF
    CREATE DATABASE IF NOT EXISTS seaweedfs DEFAULT CHARACTER SET utf8mb4 COLLATE utf8mb4_bin;
    CREATE USER IF NOT EXISTS 'seaweedfs'@'%' IDENTIFIED BY '${SW_PW}';
    ALTER USER 'seaweedfs'@'%' IDENTIFIED BY '${SW_PW}';
    GRANT ALL PRIVILEGES ON seaweedfs.* TO 'seaweedfs'@'%';
    FLUSH PRIVILEGES;
    USE seaweedfs;
    CREATE TABLE IF NOT EXISTS filemeta (
      \`dirhash\`   BIGINT       NOT NULL COMMENT 'first 64 bits of MD5 hash value of directory field',
      \`name\`      VARCHAR(766) NOT NULL COMMENT 'directory or file name',
      \`directory\` TEXT         NOT NULL COMMENT 'full path to parent directory',
      \`meta\`      LONGBLOB,
      PRIMARY KEY (\`dirhash\`, \`name\`)
    ) DEFAULT CHARSET=utf8mb4 COLLATE=utf8mb4_bin;
    EOF


primary:
  # Bitnami's "replication" architecture is single-writer — only one primary
  # is permitted; secondaries provide read HA via async replication.
  replicaCount: 1

  podAnnotations:
    proxy.istio.io/config: |
      holdApplicationUntilProxyStarts: true

  extraVolumes:
    - name: seaweedfs-db-credentials
      secret:
        secretName: seaweedfs-db-credentials
        optional: true

  extraVolumeMounts:
    - name: seaweedfs-db-credentials
      mountPath: /seaweedfs-init
      readOnly: true

  pdb:
    create: true
    maxUnavailable: 0

  persistence:
    enabled: true
    size: 5Gi
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  service:
    type: ClusterIP
    ports:
      mysql: 3306

  podAntiAffinityPreset: hard

secondary:
  # Two replicas behind the read service for read HA. Each gets its own PVC
  # via the StatefulSet — losing one node still leaves the cluster writable
  # (primary) and readable (one secondary).
  replicaCount: 2
  podManagementPolicy: Parallel

  podAnnotations:
    proxy.istio.io/config: |
      holdApplicationUntilProxyStarts: true

  pdb:
    create: true
    minAvailable: 1

  persistence:
    enabled: true
    size: 5Gi
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Spread secondaries across nodes.
  podAntiAffinityPreset: hard