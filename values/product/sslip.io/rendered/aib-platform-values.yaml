## Dev environment - AI Platform mesh configuration

# To check mTLS is configured via PeerAuthentication:
# kubectl get peerauthentication -A 
# kubectl get peerauthentication -n argocd
mesh-security:
  meshSecurity:
    mtls:
      enabled: true
      mode: STRICT
      namespaces: 
        - name: aib-auth
        - name: aib-system

    authorizationPolicies:
      - name: aib-auth
        namespace: aib-auth        # Where the policy is created
        action: ALLOW
        rules:
          - from:                           # Who is allowed
            - namespaces:                 # Allow from these namespaces
                - aib-auth
                - aib-system
                - istio-system
      - name: oauth2
        namespace: aib-auth
        action: ALLOW
        rules:
          - to:
            - hosts:
              - oauth2-proxy.aib-auth.svc.cluster.local
            - paths:
              - /oauth2/*
      - name: mlflow
        namespace: ml-orchestration
        selector:
          app: mlflow
        action: CUSTOM
        provider: oauth2-proxy
        rules:
          - {}
      - name: mlrun
        namespace: aib-system
        selector:
          release: mlrun
        action: CUSTOM
        provider: oauth2-proxy
        rules:
          - {}
      - name: kubeflow-pipelines
        namespace: kubeflow
        selector:
          app: ml-pipeline-ui
        action: CUSTOM
        provider: oauth2-proxy
        rules:
          - {}
      - name: kubeflow-dashboard
        namespace: kubeflow
        selector:
          app: kubeflow-dashboard
        action: CUSTOM
        provider: oauth2-proxy
        rules:
          - {}
    requestAuthentication: []
    rateLimiting: []

# To check Istio Gateway and Virtual Services :
# kubectl get gateways.networking.istio.io -A
# kubectl get virtualservices.networking.istio.io -A

mesh-networking:
  meshNetworking:
    domain: 34.54.147.73.sslip.io
    namespace: aib-auth
    gateway:
      enabled: true
      name: platform-ingress-gateway
      selector:
        istio: ingressgateway
      port:
