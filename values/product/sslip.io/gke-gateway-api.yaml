# common values
name: gke-gateway-api
namespace: gateway

# For ML Product cluster
addressName: gke-aib-plus-ml-product-ip
listener:
  name: https
  port: 443
  protocol: HTTPS
  tls:
    certificates:
      # The secret name on GCP must match the hostname,
      # For naming limitation on GCP...
      # Replace dots (.) with dashes (-)
      # Replace asterisk (*) with string ("wildcard")
      - "*.${BASE_DOMAIN}"

