# =============================================================================
# Bootstrap Secrets for the dev/product install
#
# All credentials the four charts (mysql, seaweedfs, mlrun, nuclio) need to
# read from K8s Secrets. Nothing in this file is auto-derived from another
# resource — you choose every value. Safe to manage under GitOps.
#
# How to use:
#   1. Copy this file: cp scripts/secrets.yaml scripts/secrets.local.yaml
#   2. Replace every REPLACE_ME_* token with a real value. Every occurrence
#      of the SAME token name must get the SAME value — two keys are
#      cross-referenced between Secrets:
#        * REPLACE_ME_MYSQL_ROOT_PASSWORD   appears in mysql-credentials AND
#                                           in the mlrun-db DSN.
#        * REPLACE_ME_S3_ADMIN_ACCESS_KEY   appears in seaweedfs-s3-config
#                                           AND minio-credentials.
#        * REPLACE_ME_S3_ADMIN_SECRET_KEY   same as above.
#      Generate each password/secret with:
#        openssl rand -base64 24 | tr -d '=+/' | cut -c1-24   # 24-char
#        openssl rand -base64 40 | tr -d '=+/' | cut -c1-40   # 40-char (S3)
#   3. Apply:    kubectl apply -f scripts/secrets.local.yaml
#   4. Run the install (dev) or commit to your GitOps repo (prod).
#
# Namespaces (aib-data, aib-system) are created by the foundation chart;
# install ordering runs foundation first. Do NOT recreate them here.
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Bitnami MySQL — root + replication passwords
#    Chart: charts/mysql, values/product/dev/mysql.yaml (auth.existingSecret)
#    Used by:  mysql primary/secondary StatefulSets
#    Read by:  mysql initdb scripts (via mounted /opt/bitnami/mysql/secrets/*)
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mysql-credentials
  namespace: aib-data
type: Opaque
stringData:
  mysql-root-password: "REPLACE_ME_MYSQL_ROOT_PASSWORD"
  # Required by bitnami/mysql when architecture: replication. Different from
  # the root password — only the replication user authenticates with this.
  mysql-replication-password: "REPLACE_ME_MYSQL_REPLICATION_PASSWORD"
  # Empty on purpose, not unused: bitnami's StatefulSet projects this Secret
  # as a files-volume with `items: [..., {key: mysql-password, path: ...}]`,
  # and the projection errors out if the key is missing. No custom MySQL
  # user is created (auth.createDatabase: false), so the file is never read.
  mysql-password: ""
---
# -----------------------------------------------------------------------------
# 2. SeaweedFS filer DB user — single source of truth for both sides
#    Read by:
#      - mysql initdb hook (charts/mysql, values mysql.yaml extraVolumes) to
#        provision the `seaweedfs` MySQL user with this password.
#      - seaweedfs filer pod (values seaweedfs.yaml, secretExtraEnvironmentVars
#        WEED_MYSQL_PASSWORD) to log in as that user.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-db-credentials
  namespace: aib-data
type: Opaque
stringData:
  mariadb-password: "REPLACE_ME_SEAWEEDFS_DB_PASSWORD"
---
# -----------------------------------------------------------------------------
# 3. MLRun HTTPDB DSN
#    Chart: charts/mlrun-ce/charts/mlrun (db.existingDsnSecret: true)
#    Read by:  mlrun-api chief/worker/model-server pods as MLRUN_HTTPDB__DSN.
#    Note: the password inside this DSN MUST match
#          mysql-credentials.mysql-root-password above.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mlrun-db
  namespace: aib-system
type: Opaque
stringData:
  # Hostname is mlrun-db-PRIMARY (the writable endpoint) — bitnami/mysql with
  # architecture: replication does not create a plain `mlrun-db` Service.
  dsn: "mysql+pymysql://root:REPLACE_ME_MYSQL_ROOT_PASSWORD@mlrun-db-primary.aib-data.svc.cluster.local:3306/mlrun"
  # Legacy SQLite path used during the one-shot SQLite -> MySQL migration.
  # Safe to leave as-is; the file at this path won't exist on a fresh install,
  # MLRun will skip the migration step, and the new MySQL DSN drives everything.
  oldDsn: "sqlite:////mlrun/db/mlrun.db?check_same_thread=false"
---
# -----------------------------------------------------------------------------
# 4. Nuclio container-builder registry credential
#    Chart: charts/mlrun-ce/charts/nuclio (global.registry.secretName)
#    Used by:  nuclio dashboard's kaniko builder to push function images,
#              and as imagePullSecret for any pod pulling from the registry.
#
# This is a Docker registry secret. The simplest way to mint it is NOT this
# YAML but the kubectl helper, which handles base64 encoding correctly:
#
#   # Google Artifact Registry with a service-account JSON key:
#   kubectl create secret docker-registry nuclio-gar-push \
#     --docker-server=europe-west1-docker.pkg.dev \
#     --docker-username=_json_key \
#     --docker-password="$(cat sa-key.json)" \
#     --docker-email=noreply@example.com \
#     --namespace aib-system \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# If you prefer to keep everything in this file, replace the placeholder
# below with the full base64-encoded JSON document (RFC 7159 escaped).
# .dockerconfigjson must contain something like:
#   {"auths":{"<registry>":{"username":"<u>","password":"<p>","auth":"<base64(u:p)>"}}}
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: nuclio-gar-push
  namespace: aib-system
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "europe-west1-docker.pkg.dev": {
          "username": "_json_key",
          "password": "REPLACE_ME_GAR_SERVICE_ACCOUNT_JSON_AS_ONE_LINE",
          "email": "noreply@example.com",
          "auth": "REPLACE_ME_BASE64_OF_USERNAME_COLON_PASSWORD"
        }
      }
    }
---
# -----------------------------------------------------------------------------
# 5. SeaweedFS S3 identity config (replaces the chart's auto-generated keys)
#    Chart:   charts/seaweedfs (s3.existingConfigSecret: seaweedfs-s3-config)
#    Used by: the seaweedfs-s3 Deployment — mounted at /etc/sw and passed to
#             `weed s3 -config=/etc/sw/seaweedfs_s3_config`.
#
# Declaring this ahead of time stops the chart from auto-generating random
# S3 keys. The trade-off: key rotation is manual — edit this file, re-apply,
# then roll the s3 Deployment.
#
# Only the admin identity is defined because no read-only consumer exists
# in this deployment. Add more identities by extending the array if you
# later introduce one (dashboards, CI, audit tooling).
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-s3-config
  namespace: aib-data
type: Opaque
stringData:
  seaweedfs_s3_config: |
    {
      "identities": [
        {
          "name": "anvAdmin",
          "credentials": [
            {
              "accessKey": "REPLACE_ME_S3_ADMIN_ACCESS_KEY",
              "secretKey": "REPLACE_ME_S3_ADMIN_SECRET_KEY"
            }
          ],
          "actions": ["Admin", "Read", "Write"]
        }
      ]
    }
---
# -----------------------------------------------------------------------------
# 6. MLRun S3 credentials (the admin identity from seaweedfs-s3-config above)
#    Chart:   charts/mlrun-ce (mlrun.api.envFrom.secretRef.name)
#    Read by: mlrun-api chief/worker pods as AWS_ACCESS_KEY_ID and
#             AWS_SECRET_ACCESS_KEY env vars (via envFrom.secretRef).
#
# Values MUST match the `anvAdmin` identity in seaweedfs-s3-config.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: aib-system
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_ME_S3_ADMIN_ACCESS_KEY"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME_S3_ADMIN_SECRET_KEY"
