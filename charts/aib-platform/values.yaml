    rateLimiting: []
    #   - name: ai-ns-ratelimit
    #     namespace: ai-namespace
    #     maxTokens: 100
    #     tokensPerFill: 50
    #     fillInterval: "60s"

mesh-networking:
  meshNetworking:
    namespace: istio-system
    domain: "aib.vodafone.com"

    gateway:
      enabled: true
      name: platform-gateway
      selector:
        istio: ingressgateway
      port:
        number: 80
        name: http
        protocol: HTTP

    services: []
    #   - name: model-api
    #     subdomain: model-api    # optional, defaults to .name
    #     serviceNamespace: my-namespace  # namespace where the K8s Service runs
    #     port: 8080
    #     pathPrefix: /predict
    #     retries:
    #       attempts: 3
    #       perTryTimeout: 2s

mesh-egress:
  meshEgress:
    namespace: istio-system
    gateway:
      enabled: false
      name: platform-egress-gateway
      serviceNamespace: istio-system
      selector:
        istio: egressgateway

    services: []
