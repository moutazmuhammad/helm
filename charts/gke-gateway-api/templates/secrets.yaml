# Must change this from Secret to ESO ExternalSecret
{{- range .Values.listener.tls.certificates }}
{{- $sanitizedName := . | replace "*" "wildcard" -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $sanitizedName }}
  namespace: {{ $.Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
type: kubernetes.io/tls
data:
  # local directory (.gitignored) untill external secrets are configured
  {{- $certPath := printf "certificates/%s/cert_%s/cert_%s.pem" . . . }}
  {{- $keyPath := printf "certificates/%s/%s.key" . . }}
  tls.crt: {{ $.Files.Get $certPath | b64enc }}
  tls.key: {{ $.Files.Get $keyPath | b64enc }}
---
{{- end }}
